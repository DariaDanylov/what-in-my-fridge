<!DOCTYPE html>
<html>
<style>
  body { font-family: sans-serif; background: #eee; padding: 20px; display: flex; gap: 40px; }
  .screen { background: white; width: 300px; height: 500px; border: 2px solid #ccc; padding: 15px; position: relative; }
  .box { background: #ddd; margin: 10px 0; height: 40px; }
  .img-placeholder { background: #ccc; height: 100px; margin-bottom: 10px; }
  .fab { position: absolute; bottom: 20px; right: 20px; background: #999; border-radius: 50%; width: 40px; height: 40px; }
</style>

<div class="screen">
  <h2>המזווה שלי</h2>
  <div class="box">חיפוש...</div>
  <div class="box">חלב (תאריך...)</div>
  <div class="box">ביצים (תאריך...)</div>
  <div class="fab"></div>
</div>

<div class="screen">
  <h2>מתכונים</h2>
  <div style="height:20px; background:#ddd">יש לך 5 מצרכים</div>
  <div class="img-placeholder"></div>
  <div class="box">מתכון 1 - 100% התאמה</div>
  <div class="box">מתכון 2 - 80% התאמה</div>
</div>

<div class="screen">
  <h2>פרטי מתכון</h2>
  <div class="img-placeholder"></div>
  <div style="font-size: 12px;">✓ מצרך 1<br>✓ מצרך 2</div>
  <div style="height: 100px; background: #ddd; margin-top:10px;">שלבי הכנה...</div>
  <button style="width:100%; margin-top: 20px;">סיימתי לבשל!</button>
</div>
</html
